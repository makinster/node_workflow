node_type: text_transform_node
class_name: TextTransformNode
category: data
primary_family: Utility
tags: ["Utility"]
group: "Data Transform"
selector_section: "Transform"
icon_name: case-sensitive
display_name: Text Transform
default_alias: Text Transform
description: Apply a text transformation (case, strip, reverse, markdown format) to the input string
input_ports: ["input"]
output_ports: ["default"]
config_tabs:
  Parameters:
    operation:
      type: select
      label: Operation
      options: ["uppercase", "lowercase", "strip", "title", "reverse", "markdown format"]
      default: uppercase
    wrap_width:
      type: integer
      label: Wrap width
      description: "Re-flow paragraphs to this width; 0 keeps existing line breaks"
      min: 0
      default: 0
      visible_when:
        operation: markdown format
execution_template: transform_stub
