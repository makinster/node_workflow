# Reference spec for the unified inputs:/outputs: authoring model (handoff §7).
# Demonstrates the full per-port I/O contract: each port declares its data
# type, required flag, description, and routing (input `sources` / output `to`)
# in one place. `inputs:` replaces the split input_sources + input_port_metadata
# sections; `outputs:` replaces output_port_metadata. Node-level Payloads
# routing still comes from the separate output_routing block below. This node is
# the regenerated reference template; mass regeneration of other nodes is
# deferred (handoff §11 step 3).
node_type: example_file_instance_node
class_name: ExampleFileInstanceNode
category: io
primary_family: Inputs
tags: ["File I/O", "Runtime Resource"]
icon_name: file-input
display_name: File Instance
default_alias: File Instance
description: Opens a file at a configured or supplied path and reports success

# Unified inputs: block — the port name (file_path) is also the source-field
# prefix, so the Source/Parameters selectors generate exactly as the legacy
# input_sources section did, while type/required/description ride along as the
# port's contract metadata.
inputs:
  file_path:
    type: file
    required: false
    label: File path
    description: Where the file path comes from at execution time
    sources: ["upstream", "vault", "configured"]
    default: configured
    parameter:
      type: string
      label: File path
      placeholder: /path/to/file

# Unified outputs: block — per-port contract metadata, including the routing
# destinations (`to`) and the dead-drop passthrough capability the detail panel
# renders (§8). The actual Payloads config fields come from output_routing.
outputs:
  default:
    name: Open Result
    type: bool
    required: true
    to: ["downstream", "vault"]
    pass_through: true
    description: True when the file opened successfully, false on error

# Standard output routing model: generates transient_output and
# dead_drop_passthrough (mutually exclusive) plus optional Vault write fields
# gated on the vault_write checkbox. Unchanged by the unified blocks.
output_routing:
  default: transient
  transient_label: Send bool result to next node
  dead_drop_label: Forward incoming payload unchanged
  vault:
    mode: optional
    label: Save error message to Vault
    key_label: Error log Vault key

execution_template: transform_stub
