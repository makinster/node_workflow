# Chat Completion node — unified inputs:/outputs: contract (NODE_HELPER.md).
#
# The registered node's execute() is HAND-WRITTEN: it makes a real Anthropic
# call through backend/llm_provider.py and implements AI session persistence
# (use_chat_session / session_key / continue_session_key). Do NOT regenerate
# over backend/nodes/chat_completion_node.py without porting execute() and
# re-checking the fields below.
#
# The model options list mirrors backend/llm_provider.SUPPORTED_MODELS — the
# single curated constant the registered node reads directly. Update the
# constant first; this spec copy is documentation for regeneration only.
node_type: chat_completion_node
class_name: ChatCompletionNode
category: ai
primary_family: Complex
tags: ["AI"]
icon_name: bot-message-square
display_name: Chat Completion
default_alias: Chat Completion
description: Send a prompt to an LLM and receive a text response
group: AI Processing
selector_section: AI

inputs:
  prompt:
    type: string
    required: true
    label: Prompt
    description: Instruction text sent to the model
    sources: ["upstream", "vault", "configured"]
    default: configured
    parameter:
      type: multiline
      label: Prompt
  document:
    type: string
    required: false
    label: Document / context
    description: Optional document appended to the prompt
    sources: ["upstream", "vault", "configured"]
    default: upstream
    parameter:
      type: multiline
      label: Document
    # Continue-mode edge case (hand-written on the registered node): when the
    # prompt source is "Continue AI session" the document carries the new turn,
    # so document_source is required, its section retitles to Required Inputs,
    # and its value is locked to Configured. Documented here; the generated
    # <port>_source field would need these rule keys merged in on regeneration.

outputs:
  default:
    name: LLM Result
    type: string
    required: true
    to: ["downstream", "vault"]
    pass_through: true
    description: Model response text (or forwarded payload on dead-drop)

# Output model (NODE_STANDARDS, revised 2026-07-08): the Payloads tab is
# composed from output_port_metadata `to` (one Downstream node payload + the
# Vault duplicate), NOT from output_routing checkboxes. The registered node's
# Result (string) is downstream by default and optionally duplicated to the
# Vault. The generated output_routing block below is retained only as legacy
# documentation; the hand-written node does not use it.
output_routing:
  default: transient
  transient_label: Send LLM result to next node
  dead_drop_label: Forward incoming payload unchanged
  vault:
    mode: optional
    label: Save LLM result to Vault
    key_label: Result Vault key

config_tabs:
  Source:
    # The registered node also adds a fourth prompt_source option,
    # "Continue AI session", which reveals this dropdown and replaces the
    # prompt with the selected session's history (hand-written; the inputs
    # block cannot express extra selector options).
    continue_session_key:
      type: string
      label: Session
      required: false
      section: Required Inputs
      vault_type: ai_session
      visible_when:
        prompt_source: Continue AI session
      description: Declared AI session whose chat this node resumes
  Parameters:
    model:
      type: select
      label: Model
      options: ["claude-opus-4-8", "claude-sonnet-5", "claude-sonnet-4-6", "claude-haiku-4-5"]
      default: claude-opus-4-8
      required: true
    max_tokens:
      type: integer
      label: Max tokens
      default: 1024
      required: true
    temperature:
      type: float
      label: Temperature
      default: 1.0
      required: true
      description: Ignored by models that do not accept sampling parameters
    api_key_secret:
      type: string
      label: API key (secrets store key)
      secret: true
      required: true
  Payloads:
    # AI Session persistence lives with routing in the Payloads tab (2026-07-07).
    use_chat_session:
      type: boolean
      label: Keep active AI session
      default: false
      section: AI Session
    session_key:
      type: string
      label: Session key
      required: false
      section: AI Session
      # Hidden in Continue mode too: the resumed session is kept active, so no
      # new key is asked for (registered node uses the list-OR form of the
      # non-continue prompt sources).
      visible_when:
        use_chat_session: true
